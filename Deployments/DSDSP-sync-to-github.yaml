name: dsdsp-sync-github-$(Date:yyyyMMdd)

trigger:
  branches:
    include:
      - main

jobs:
- job: sync_to_github
  displayName: Sync to GitHub
  pool:
    vmImage: ubuntu-latest
  variables:
    - group: Azure-Static-Web-Apps-nice-rock-0193cc903-variable-group

  steps:
    - checkout: self
      submodules: true

    - script: |
        set -euo pipefail

        git config --global user.email "pipeline@azure.com"
        git config --global user.name "Azure Pipeline"

        # Authenticate with PAT using an HTTP header (no password-style URL auth).
        AUTH_HEADER=$(printf 'x-access-token:%s' "$GIT_PAT" | base64 | tr -d '\n')

        git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${AUTH_HEADER}" \
          push https://github.com/thomgiles/DSDSP.git HEAD:main
      displayName: 'Sync to GitHub'
      env:
        GIT_PAT: $(GIT_PAT)

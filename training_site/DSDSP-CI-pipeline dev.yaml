  name: Azure Static Web Apps CI/CD

  trigger:
    branches:
      include:
        - dev

  pr:
    branches:
      include:
        - dev

  jobs:
  - job: build_and_deploy_job
    displayName: Build and Deploy Job
    pool:
      vmImage: ubuntu-latest
    variables:
      - group: Azure-Static-Web-Apps-victorious-moss-01eb84103-variable-group

    steps:
      - checkout: self
        submodules: true

      - task: AzureStaticWebApp@0
        inputs:
          azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_MOSS_01EB84103)
          app_location: "training_site"
          output_location: "_site"
          api_location: ""

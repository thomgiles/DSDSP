format:
  html:
    toc: true
    number-sections: false
    page-layout: article
    filters:
      - dynamic-code-output
      - pyodide
      - webr
    title-block-style: none
  

  revealjs:
    theme:
      - black
      - ../../uon.scss
    output-ext: revealjs.html
    slide-number: true
    smaller: true
    scrollable: true
    chalkboard: true
    controls: true
    controls-layout: bottom-right
    preview-links: auto
    navigation-mode: linear
    footer: "Data Science and Digital Skills"
    filters:
      - dynamic-code-output
      - pyodide
      - webr
    title-block-style: none

  pdf:
    output-ext: pdf

  commonmark:
    output-ext: digital-notebook.md
      
execute: 
  eval: false 
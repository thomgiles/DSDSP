  name: Azure Static Web Apps CI/CD

  trigger:
    branches:
      include:
        - main

  pr:
    branches:
      include:
        - main

  jobs:
  - job: build_and_deploy_job
    displayName: Build and Deploy Job
    pool:
      vmImage: ubuntu-latest
    variables:
      - group: Azure-Static-Web-Apps-nice-rock-0193cc903-variable-group

    steps:
      - checkout: self
        submodules: true

      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.11'
        displayName: 'Set up Python 3.11'

      - script: |
          pip install -r requirements.txt
          pip install jupyter pyyaml
        workingDirectory: training_site
        displayName: 'Restore Python environment'

      - script: |
          sudo apt-get update
          sudo apt-get install librsvg2-bin
          sudo apt-get install texlive-xetex
          curl -sSLO https://quarto.org/download/latest/quarto-linux-amd64.deb
          sudo dpkg -i quarto-linux-amd64.deb
          quarto --version
          quarto install tinytex
          quarto install jupyter
        displayName: 'Install Quarto CLI'

      - script: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends r-base
          R --version
        displayName: 'Install R'

      - script: |
          mkdir -p ~/.R/library
          echo 'R_LIBS_USER="~/.R/library"' >> ~/.Renviron
          Rscript -e 'install.packages("renv", repos = "https://cloud.r-project.org")'
          Rscript -e 'renv::restore()'
          export R_LIBS_USER=$HOME/.R/library
        workingDirectory: training_site
        displayName: 'Restore R environment'

      - script: |
          quarto render .
          echo "Debug: list contents"
          pwd
          ls -al
          ls -al _site || echo "_site not found"
          test -f _site/index.html
        workingDirectory: training_site
        displayName: 'Render Quarto site'

      - task: AzureStaticWebApp@0
        inputs:
          azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_ROCK_0193CC903)
          app_location: "training_site"
          output_location: "_site"
          api_location: ""

format:
  html:
    toc: true
    number-sections: false
    page-layout: article

  revealjs:
    theme:
      - black
      - ../../uon.scss
    output-ext: revealjs.html
    slide-number: true
    smaller: true
    scrollable: true
    chalkboard: true
    controls: true
    controls-layout: bottom-right
    preview-links: auto
    footer: "Data Science and Digital Skills"

  pdf:
    output-ext: pdf
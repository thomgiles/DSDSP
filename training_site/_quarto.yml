project:
  type: website
  output-dir: _site

execute:
  freeze: auto

format:
  html:
    theme:
        - default
        - uon.scss
    toc: true
    number-sections: false
    page-layout: article

website:
  cookie-consent:
    type: express
    style: headline
    palette: dark
  open-graph:
    locale: es_ES
    site-name: Quarto
  announcement: 
    icon: info-circle
    dismissable: true
    content: "**Alert** - This site is currently under construction"
    type: primary
    position: below-navbar
    

  page-footer:
    left: |
      <h3>Location</h3>
      University of Nottingham  
      University Park  
      Nottingham, NG7 2RD  
      United Kingdom
    center: |
      <h3>Quick links</h3>
      [Submit an enquiry](#)  
      [Capabilities](#)  
      [About us](#)  
      [Jobs](#)  
      [Privacy policy](#)
      
    right: |
     <h3>Get in touch</h3>
     <a href="mailto:digitalresearch@nottingham.ac.uk">digitalresearch@nottingham.ac.uk</a>
  
  navbar:
    title: ""
    logo: assets/UoN_logo.png
    collapse: true
    background: "#0e1a2b"
    foreground: "#ffffff"
    left:
      - text: "Home"
        href: index.qmd
      - text: "Essential Digital Skills"
        href: essential_digital_skills/index.qmd
      - text: "Responsible Use of Generative AI"
        href: responsible_use_of_generative_ai/index.qmd
      - text: "Applied Data Science (Python)"
        href: applied_python/index.qmd
      - text: "Applied Data Science (R)"
        href: applied_R/index.qmd

  sidebar:
    - id: "essential-digital-skills"
      title: "Essential Digital Skills"
      style: "docked"
      search: true
      collapse-level: 3
      contents:
        - text: "Overview"
          href: essential_digital_skills/index.qmd
        - section: "Lessons"
          contents:
            - essential_digital_skills/episodes/01-digital_tools.qmd
            - essential_digital_skills/episodes/02-digital_delivery.qmd
            - essential_digital_skills/episodes/03-data_governance_and_policy.qmd
            - essential_digital_skills/episodes/04-research_data_managment.qmd
            - essential_digital_skills/episodes/05-collecting_the_right_data.qmd
            - essential_digital_skills/episodes/06-organising_and_exploring_data.qmd
            - essential_digital_skills/episodes/07-making_sense_of_data.qmd
            - essential_digital_skills/episodes/08-insight_to_impacts.qmd
        - section: "Learners"
          contents:
            - essential_digital_skills/learners/setup.qmd
            - essential_digital_skills/learners/discuss.qmd
            - essential_digital_skills/learners/reference.qmd
        - section: "Instructors"

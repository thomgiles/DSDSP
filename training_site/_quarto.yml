project:
  type: website
  output-dir: _site

execute:
  freeze: auto

format:
  html:
    theme: 
        - default
        - ./uon.scss
    toc: true
    number-sections: false
    page-layout: article

website:
  cookie-consent:
    type: express
    style: headline
    palette: dark
  open-graph:
    locale: es_ES
    site-name: Quarto
  announcement: 
    icon: info-circle
    dismissable: true
    content: "**Alert** - This site is currently under construction"
    type: primary
    position: below-navbar

  page-footer:
    left: |
      ![Logo image](/training_site/assets/UoN_dark_logo.png)
      
  navbar:
    title: "DSDSP"
    subtitle: 
    logo: assets/Logo_dark_500.png
    left:
      - text: "Essential Digital Skill"
        href: "esential_digital_skills/index.html"
      - text: "Methods for Data Science"
        href: "methods_for_data_science/index.html"

  sidebar:
    style: "docked"
    search: true
    collapse-level: 4
    contents:
      - section: "Learning modules"
        contents:
          - section: "Essential Digital Skills"
            href: essential_digital_skills/index.qmd
            contents:
              - section: "Digital Research at UoN"
                href: essential_digital_skills/digital_research_at_uon/index.qmd
                contents:
                  - essential_digital_skills/digital_research_at_uon/episodes/01-digital_tools.qmd
                  - essential_digital_skills/digital_research_at_uon/episodes/02-digital_delivery.qmd
              - section: "Using Data Responsibly"
                href: essential_digital_skills/using_data_responsibly/index.qmd
                contents:
                  - essential_digital_skills/using_data_responsibly/episodes/01-data_governance_and_policy.qmd
                  - essential_digital_skills/using_data_responsibly/episodes/02-research_data_managment.qmd

          - section: "Methods for Data Science"
            href: methods_for_data_science/index.qmd
            contents:
              - section: "Applied Data Sciences (Python)"
                href: methods_for_data_science/applied_python/index.qmd
                contents:
                  - section: "Episodes"
                    contents:
                      - methods_for_data_science/applied_python/episodes/01-intro.qmd
                      - methods_for_data_science/applied_python/episodes/02-numpy.qmd
                      - methods_for_data_science/applied_python/episodes/03-matplotlib.md

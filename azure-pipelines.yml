trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  # --- Install R manually ---
  - script: |
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends r-base
      R --version
    displayName: 'Install R manually'

  # --- Install renv and restore R environment ---
  - script: |
      Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org")'
      Rscript -e 'renv::restore()'
    displayName: 'Restore R packages with renv'

  # --- Install Python packages for Quarto ---
  - script: |
      pip install -r requirements.txt
    displayName: 'Install Python packages'

  # --- Check and render Quarto presentations ---
  - script: |
      quarto check
      chmod +x .azure/scripts/render_quarto.sh
      .azure/scripts/render_quarto.sh
    displayName: 'Render all Quarto presentations'

  # --- Publish each presentation as a separate artifact ---
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'presentations/talk-1/_site'
      ArtifactName: 'talk-1-site'
      publishLocation: 'Container'
    condition: succeededOrFailed()

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'presentations/talk-2/_site'
      ArtifactName: 'talk-2-site'
      publishLocation: 'Container'
    condition: succeededOrFailed()

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  # --- Install Quarto CLI ---
  - script: |
      curl -sSLO https://quarto.org/download/latest/quarto-linux-amd64.deb
      sudo dpkg -i quarto-linux-amd64.deb
      quarto --version
    displayName: 'Install Quarto CLI'

  # --- Install R manually ---
  - script: |
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends r-base
      R --version
    displayName: 'Install R'

  # --- Restore R environment using renv ---
  - script: |
      Rscript -e 'install.packages("renv", repos = "https://cloud.r-project.org")'
      Rscript -e 'renv::restore()'
    displayName: 'Restore R packages using renv'

  # --- Install Python dependencies ---
  - script: |
      pip install -r requirements.txt
    displayName: 'Install Python packages'

  # --- Render all course presentations ---
  - script: |
      chmod +x .azure/scripts/render_quarto.sh
      .azure/scripts/render_quarto.sh
    displayName: 'Render all Quarto course sites'

  # --- Conditionally publish each course site if it exists ---
  - script: |
      for course in presentations/*; do
        sitedir="$course/_site"
        name="$(basename "$course")"
        if [ -d "$sitedir" ]; then
          echo "Publishing: $sitedir as artifact: $name"
          echo "##vso[artifact.upload containerfolder=$name;artifactname=$name]$sitedir"
        else
          echo "Skipping $name (no _site directory)"
        fi
      done
    displayName: 'Publish course sites as build artifacts'

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  - task: RInstaller@1
    inputs:
      versionSpec: '4.3.1'

  - script: |
      pip install -r requirements.txt
    displayName: 'Install Python packages'

  - script: |
      Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org")'
      Rscript -e 'renv::restore()'
    displayName: 'Restore R packages with renv'

  - script: |
      quarto check
      chmod +x .azure/scripts/render_quarto.sh
      .azure/scripts/render_quarto.sh
    displayName: 'Render all Quarto presentations'

  # Publish each talk’s rendered output as a separate artifact
  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'presentations/talk-1/_site'
      ArtifactName: 'talk-1-site'
      publishLocation: 'Container'
    condition: succeededOrFailed()

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: 'presentations/talk-2/_site'
      ArtifactName: 'talk-2-site'
      publishLocation: 'Container'
    condition: succeededOrFailed()

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  # --- Install Quarto CLI ---
  - script: |
      curl -sSLO https://quarto.org/download/latest/quarto-linux-amd64.deb
      sudo dpkg -i quarto-linux-amd64.deb
      quarto --version
    displayName: 'Install Quarto CLI'

  # --- Install R manually ---
  - script: |
      sudo apt-get update
      sudo apt-get install -y --no-install-recommends r-base
      R --version
    displayName: 'Install R'

  # --- Restore R environment using renv ---
  - script: |
      Rscript -e 'install.packages("renv", repos = "https://cloud.r-project.org")'
      Rscript -e 'renv::restore()'
    displayName: 'Restore R packages using renv'

  # --- Install Python dependencies ---
  - script: |
      pip install -r requirements.txt
    displayName: 'Install Python packages'

  # --- Render all Quarto presentations ---
  - script: |
      chmod +x .azure/scripts/render_quarto.sh
      .azure/scripts/render_quarto.sh
    displayName: 'Render all Quarto presentations'

  # --- Conditionally publish rendered _site for talk-1 ---
  - script: |
      if [ -d "presentations/talk-1/_site" ]; then
        echo "##vso[artifact.upload containerfolder=talk-1-site;artifactname=talk-1-site]presentations/talk-1/_site"
      else
        echo "Talk-1 site not found, skipping publish."
      fi
    displayName: 'Publish talk-1 site if exists'

  # --- Conditionally publish rendered _site for talk-2 ---
  - script: |
      if [ -d "presentations/talk-2/_site" ]; then
        echo "##vso[artifact.upload containerfolder=talk-2-site;artifactname=talk-2-site]presentations/talk-2/_site"
      else
        echo "Talk-2 site not found, skipping publish."
      fi
    displayName: 'Publish talk-2 site if exists'

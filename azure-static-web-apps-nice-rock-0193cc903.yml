name: Azure Static Web Apps CI/CD

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

jobs:
- job: build_and_deploy_job
  displayName: Build and Deploy Job
  pool:
    vmImage: ubuntu-latest
  variables:
    - group: Azure-Static-Web-Apps-nice-rock-0193cc903-variable-group

  steps:
    - checkout: self
      submodules: true

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: 'Set up Python 3.11'

    - script: |
        pip install -r requirements.txt
        pip install jupyter pyyaml
      workingDirectory: $(System.DefaultWorkingDirectory)
      displayName: 'Install Python packages from root'

    - script: |
        curl -sSLO https://quarto.org/download/latest/quarto-linux-amd64.deb
        sudo dpkg -i quarto-linux-amd64.deb
        quarto --version
      displayName: 'Install Quarto CLI'

    - script: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends r-base
        R --version
      displayName: 'Install R'

    - script: |
        mkdir -p ~/.R/library
        echo 'R_LIBS_USER="~/.R/library"' >> ~/.Renviron
        Rscript -e 'install.packages("renv", repos = "https://cloud.r-project.org")'
      workingDirectory: $(System.DefaultWorkingDirectory)
      displayName: 'Install and configure renv'

    - script: |
        Rscript -e 'renv::restore()'
      workingDirectory: $(System.DefaultWorkingDirectory)
      displayName: 'Restore R environment with renv'

    - script: |
        quarto render .
      workingDirectory: presentations/course-a
      displayName: 'Render Quarto site'

    - script: |
        test -f _site/index.html
      workingDirectory: presentations/course-a
      displayName: 'Verify site output'

    - task: AzureStaticWebApp@0
      inputs:
        azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_ROCK_0193CC903)
        app_location: "presentations/course-a"
        output_location: "_site"
        api_location: ""

name: Azure Static Web Apps CI/CD

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

jobs:
- job: build_and_deploy_job
  displayName: Build and Deploy Job
  condition: or(eq(variables['Build.Reason'], 'Manual'), or(eq(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.Reason'], 'IndividualCI')))
  pool:
    vmImage: ubuntu-latest
  variables:
    - group: Azure-Static-Web-Apps-nice-rock-0193cc903-variable-group
  steps:
    - checkout: self
      submodules: true

    - task: AzureStaticWebApp@0
      inputs:
        azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_ROCK_0193CC903)

        # Set these to match your actual Quarto build output
        app_location: "presentations/course-a"   # Where Quarto source is
        output_location: "_site"                  # Where Quarto outputs HTML
        api_location: ""                          # Optional, leave blank if not used
